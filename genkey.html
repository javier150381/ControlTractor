<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generar Anon Key — TractorPro</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; background: #0f172a; color: #e2e8f0; }
  h2 { color: #7c3aed; }
  label { display: block; margin-top: 16px; font-size: 14px; color: #94a3b8; }
  input, textarea { width: 100%; padding: 10px; margin-top: 6px; border-radius: 8px; border: 1px solid #334155;
    background: #1e293b; color: #e2e8f0; font-size: 13px; box-sizing: border-box; }
  button { margin-top: 20px; padding: 12px 24px; background: #7c3aed; color: white; border: none;
    border-radius: 8px; cursor: pointer; font-size: 15px; width: 100%; }
  button:hover { background: #6d28d9; }
  #result { margin-top: 20px; display: none; }
  #result textarea { background: #0f2a1e; border-color: #16a34a; color: #4ade80; font-family: monospace; }
  .copy-btn { background: #16a34a; margin-top: 8px; }
  .note { font-size: 12px; color: #64748b; margin-top: 8px; }
  .step { background: #1e293b; border-left: 3px solid #7c3aed; padding: 10px 14px; margin: 8px 0; border-radius: 4px; font-size: 13px; }
</style>
</head>
<body>
<h2>🔑 Generador de Anon Key — TractorPro</h2>

<div class="step">1. Ve a <strong>Supabase → Project Settings → API → JWT Keys → Legacy JWT Secret</strong></div>
<div class="step">2. Haz clic en <strong>"Reveal"</strong> y copia el secreto</div>
<div class="step">3. Pégalo abajo y haz clic en <strong>Generar</strong></div>

<label for="secret">Legacy JWT Secret de Supabase:</label>
<input type="text" id="secret" placeholder="Pega aquí el secreto (CnaXRn3O... o similar)">
<p class="note">Este secreto NO se envía a ningún servidor. Se procesa 100% en tu navegador.</p>

<button onclick="generate()">⚡ Generar Anon Key</button>

<div id="result">
  <label>Tu Anon Key (cópiala y úsala en la app):</label>
  <textarea id="output" rows="4" readonly></textarea>
  <button class="copy-btn" onclick="copyKey()">📋 Copiar Anon Key</button>
  <p class="note" id="status"></p>
</div>

<script>
async function generate() {
  const secretInput = document.getElementById('secret').value.trim();
  if (!secretInput) { alert('Pega el Legacy JWT Secret primero.'); return; }

  try {
    // Detect if the secret is base64-encoded (contains +, /, =)
    let keyBytes;
    const isBase64 = /[+/=]/.test(secretInput) && !secretInput.startsWith('eyJ');
    if (isBase64) {
      // Decode base64 to bytes
      const bin = atob(secretInput);
      keyBytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) keyBytes[i] = bin.charCodeAt(i);
    } else {
      keyBytes = new TextEncoder().encode(secretInput);
    }

    const header  = { alg: 'HS256', typ: 'JWT' };
    const payload = { role: 'anon', iss: 'supabase', iat: 1744834800, exp: 1893456000 };

    const b64url = obj => btoa(JSON.stringify(obj))
      .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');

    const sigInput = `${b64url(header)}.${b64url(payload)}`;

    const key = await crypto.subtle.importKey(
      'raw', keyBytes, { name:'HMAC', hash:'SHA-256' }, false, ['sign']
    );
    const sig = await crypto.subtle.sign('HMAC', key, new TextEncoder().encode(sigInput));
    const sigB64 = btoa(String.fromCharCode(...new Uint8Array(sig)))
      .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');

    const token = `${sigInput}.${sigB64}`;
    document.getElementById('output').value = token;
    document.getElementById('result').style.display = 'block';
    document.getElementById('status').textContent = '✅ Key generada correctamente. Úsala en la app.';
  } catch(e) {
    alert('Error al generar: ' + e.message);
  }
}

function copyKey() {
  const t = document.getElementById('output');
  t.select();
  document.execCommand('copy');
  document.getElementById('status').textContent = '✅ ¡Copiado al portapapeles!';
}
</script>
</body>
</html>
